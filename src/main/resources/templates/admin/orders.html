<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Orders | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-nav :: admin-nav}"></div>
<div class="admin-content">
    <div th:replace="~{fragments/layout :: flash}"></div>
    <div class="admin-page-header">
        <h1>All Orders</h1>
        <span th:text="${orders.totalElements} + ' total orders'">0 orders</span>
    </div>

    <div class="admin-card">
        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Order #</th>
                        <th>Customer</th>
                        <th>Date</th>
                        <th>Items</th>
                        <th>Total</th>                        
                        <th>Status</th>
                        <th>Assign delivery</th>
						<th>Delivery Slot</th>
						<th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders.content}">
                        <td><strong th:text="${order.orderNumber}">SW-001</strong></td>
                        <td>
                            <strong th:text="${order.user.fullName}">Name</strong><br/>
                            <!--<small th:text="${order.user.email}" style="color:#888;">email</small><br>
							<small th:text="${order.user.phone}" style="color:#888;">phone</small>-->
                        </td>
                        <td th:text="${#temporals.format(order.createdAt, 'dd MMM yy')}">Date</td>
                        <td th:text="${order.orderItems.size()}">0</td>
                        <td th:text="'₹' + ${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 0, 'POINT')}">₹0</td>
                        
                        <td>
                            <span class="status-badge" th:classappend="'status-' + ${order.status.name().toLowerCase()}"
                                  th:text="${order.status}">PENDING</span>
								  <!-- ✅ Show return/exchange tag in admin orders table -->
								  <div th:if="${order.status.name() == 'RETURN_REQUESTED'}"
								       style="margin-top:.3rem; font-size:.75rem; font-weight:700;
								              color:#c94210; background:#fff0ea; padding:.2rem .6rem;
								              border-radius:99px; border:1px solid #e8521a;
								              display:inline-block;">
								      <i class="fas fa-undo"></i> Return Requested
								  </div>

								  <div th:if="${order.status.name() == 'EXCHANGE_REQUESTED'}"
								       style="margin-top:.3rem; font-size:.75rem; font-weight:700;
								              color:#0c447c; background:#e6f1fb; padding:.2rem .6rem;
								              border-radius:99px; border:1px solid #185fa5;
								              display:inline-block;">
								      <i class="fas fa-sync-alt"></i> Exchange Requested
								  </div>					  
                        </td>
                        <td>                            
							<!-- ✅ Add Assign Delivery button for each order -->
							<a th:href="@{/admin/orders/{id}/assign(id=${order.id})}"
							   style="display:inline-block; margin-top:.4rem;
							          background:#fff0ea; color:#e8521a;
							          border:1px solid #e8521a; border-radius:6px;
							          padding:.3rem .8rem; font-size:.78rem;
							          font-weight:600; text-decoration:none;">
							    <i class="fas fa-user-plus"></i>
							    <span th:text="${order.assignedTo != null}
							                   ? 'Reassign' : 'Assign Partner'">
							    </span>
							</a>

							<!-- Show who is currently assigned -->
							<div th:if="${order.assignedTo != null}"
							     style="font-size:.75rem; color:#1a9e5c;
							            margin-top:.3rem; font-weight:600;">
							    <i class="fas fa-check-circle"></i>
							    <span th:text="${order.assignedTo.fullName}"></span>
							</div>
							<div th:unless="${order.assignedTo != null}"
							     style="font-size:.75rem; color:#e8521a; margin-top:.3rem;">
							    <i class="fas fa-exclamation-circle"></i> Not assigned
							</div>
                        </td>
						<td th:text="${order.deliverySlot != null
						              and !#strings.isEmpty(order.deliverySlot)
						              ? order.deliverySlot : 'Not selected'}"
						    style="font-size:.8rem; color:#6b6560;">
						</td>
						<td>
							<div style="display:flex; flex-direction:column; gap:.4rem;">
						            <!-- View Details -->
						         <a th:href="@{/admin/orders/{id}(id=${order.id})}"
						            style="display:inline-flex; align-items:center; gap:.3rem;
						                   background:#f4f1ed; color:#1a1814;
						                   border:1px solid #e8e4df; border-radius:6px;
						                   padding:.3rem .75rem; font-size:.78rem;
						                   font-weight:600; text-decoration:none;
						                   white-space:nowrap;">
						         	<i class="fas fa-eye"></i> View Details
						         </a>
							</div>
						</td>
                    </tr>
                    <tr th:if="${orders.content.empty}">
                        <td colspan="8" style="text-align:center; color:#888; padding:2rem;">No orders found</td>
						
                    </tr>
                </tbody>
            </table>
        </div>
        <!-- Pagination -->
        <div class="pagination" th:if="${orders.totalPages > 1}">
            <a th:if="${!orders.first}" th:href="@{/admin/orders(page=${orders.number - 1})}" class="page-btn">
                <i class="fas fa-chevron-left"></i>
            </a>
            <span th:each="i : ${#numbers.sequence(0, orders.totalPages - 1)}">
                <a th:href="@{/admin/orders(page=${i})}" th:text="${i + 1}"
                   class="page-btn" th:classappend="${i == orders.number} ? 'active' : ''">1</a>
            </span>
            <a th:if="${!orders.last}" th:href="@{/admin/orders(page=${orders.number + 1})}" class="page-btn">
                <i class="fas fa-chevron-right"></i>
            </a>
        </div>
    </div>
	
</div>
</body>
</html>
