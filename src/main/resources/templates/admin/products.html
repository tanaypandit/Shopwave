<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Products | Admin</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link
		href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
		rel="stylesheet" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
	<link rel="stylesheet" th:href="@{/css/main.css}" />
	<link rel="stylesheet" th:href="@{/css/admin.css}" />
</head>

<body class="admin-body">
	<div th:replace="~{fragments/admin-nav :: admin-nav}"></div>
	<div class="admin-content">
		<div th:replace="~{fragments/layout :: flash}"></div>
		<div class="admin-page-header">
			<h1>Products</h1>
			<a th:href="@{/admin/products/new}" class="btn-primary">
				<i class="fas fa-plus"></i> Add Product
			</a>
		</div>

		<div class="admin-card">
			<div class="admin-table-wrapper">
				<table class="admin-table">
					<thead>
						<tr>
							<th>Image</th>
							<th>Name</th>
							<th>Category</th>
							<th>Price</th>
							<th>Stock</th>
							<th>Rating</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="p : ${products.content}">
							<td><img th:src="${p.imageUrl}" alt="Product"
									style="width:50px;height:50px;object-fit:cover;border-radius:8px;"
									onerror="this.src='https://via.placeholder.com/50'" /></td>
							<td>
								<strong th:text="${p.name}">Name</strong><br />
								<small th:text="${p.brand}" style="color:#888;">Brand</small>
							</td>
							<td th:text="${p.category?.name ?: 'Uncategorized'}">Category</td>
							<td th:text="'₹' + ${#numbers.formatDecimal(p.price, 1, 'COMMA', 0, 'POINT')}">₹0</td>
							<td>
								<span th:classappend="${p.stockQuantity < 10} ? 'text-danger' : 'text-success'"
									th:text="${p.stockQuantity}">0</span>
							</td>
							<td style="text-align: center;" th:text="${p.rating} + '★'">4.5★</td>
							<td>
								<div class="action-buttons">
									<a th:href="@{/admin/products/edit/{id}(id=${p.id})}" class="btn-outline btn-sm">
										<i class="fas fa-edit"></i>
									</a>

									<form th:action="@{/admin/products/delete/{id}(id=${p.id})}" method="post"
										onsubmit="return confirm('Delete this product?')">
										<button type="submit" class="btn-danger btn-sm">
											<i class="fas fa-trash"></i>
										</button>
									</form>
								</div>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
			<!-- Pagination -->
			<div class="pagination" th:if="${products.totalPages > 1}">
				<a th:if="${!products.first}" th:href="@{/admin/products(page=${products.number - 1})}"
					class="page-btn">
					<i class="fas fa-chevron-left"></i>
				</a>
				<span th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}">
					<a th:href="@{/admin/products(page=${i})}" th:text="${i + 1}" class="page-btn"
						th:classappend="${i == products.number} ? 'active' : ''">1</a>
				</span>
				<a th:if="${!products.last}" th:href="@{/admin/products(page=${products.number + 1})}" class="page-btn">
					<i class="fas fa-chevron-right"></i>
				</a>
			</div>
		</div>
	</div>
</body>

</html>
