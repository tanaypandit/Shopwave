<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${product.id != null ? 'Edit Product' : 'New Product'} + ' | Admin'">Product | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-nav :: admin-nav}"></div>
<div class="admin-content">
    <div class="admin-page-header">
        <h1 th:text="${product.id != null ? 'Edit Product' : 'Add New Product'}">Product Form</h1>
        <a th:href="@{/admin/products}" class="btn-outline">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>

    <div class="admin-card" style="max-width: 800px;">
        <form th:action="@{/admin/products/save}" method="post" th:object="${product}">
            <input type="hidden" th:field="*{id}"/>
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Product Name *</label>
                    <input type="text" th:field="*{name}" required placeholder="e.g. Wireless Headphones"/>
                </div>
                <div class="form-group">
                    <label>Price (₹) *</label>
                    <input type="number" th:field="*{price}" step="0.01" required min="0" placeholder="1999.00"/>
                </div>
                <div class="form-group">
                    <label>Stock Quantity *</label>
                    <input type="number" th:field="*{stockQuantity}" required min="0" placeholder="100"/>
                </div>
                <div class="form-group">
                    <label>Brand</label>
                    <input type="text" th:field="*{brand}" placeholder="e.g. Samsung"/>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select th:field="*{categoryId}">
                        <option value="">-- Select Category --</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${product.category != null and product.category.id == cat.id}">
                            Category
                        </option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Image URL</label>
                    <input type="text" th:field="*{imageUrl}" placeholder="https://example.com/image.jpg"
                           oninput="previewImage(this.value)"/>
                </div>
                <div class="form-group" th:if="${product.imageUrl != null and !product.imageUrl.empty}">
                    <label>Image Preview</label>
                    <img th:src="${product.imageUrl}" id="imgPreview" alt="Preview"
                         style="max-width:200px; border-radius:8px;"/>
                </div>
                <div class="form-group" th:unless="${product.imageUrl != null and !product.imageUrl.empty}">
                    <label>Image Preview</label>
                    <img id="imgPreview" alt="Preview" src="#"
                         style="max-width:200px; border-radius:8px; display:none;"/>
                </div>
                <div class="form-group full-width">
                    <label>Description</label>
                    <textarea th:field="*{description}" rows="4" placeholder="Product description..."></textarea>
                </div>
                <div class="form-group">
                    <label>Rating (0–5)</label>
                    <input type="number" th:field="*{rating}" step="0.1" min="0" max="5" placeholder="4.5"/>
                </div>
                <div class="form-group">
                    <label>Review Count</label>
                    <input type="number" th:field="*{reviewCount}" min="0" placeholder="0"/>
                </div>
            </div>
            <div style="display:flex; gap:1rem; margin-top:1rem;">
                <button type="submit" class="btn-primary">
                    <i class="fas fa-save"></i>
                    <span th:text="${product.id != null ? 'Update Product' : 'Save Product'}">Save</span>
                </button>
                <a th:href="@{/admin/products}" class="btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script>
function previewImage(url) {
    const img = document.getElementById('imgPreview');
    if (url) { img.src = url; img.style.display = 'block'; }
    else { img.style.display = 'none'; }
}
</script>
</body>
</html>
