<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | ShopWave</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="auth-page">
<div class="auth-container">
    <div class="auth-brand">
        <a href="/" class="logo">Shop<span>Wave</span></a>
        <h2>Welcome Back</h2>
        <p>Sign in to continue shopping</p>
    </div>

    <div th:if="${param.error}" class="flash flash-error">
        <i class="fas fa-exclamation-circle"></i> Invalid email or password.
    </div>
    <div th:if="${param.logout}" class="flash flash-success">
        <i class="fas fa-check-circle"></i> You have been logged out.
    </div>
    <div th:if="${success}" class="flash flash-success">
        <i class="fas fa-check-circle"></i>
        <span th:text="${success}"></span>
    </div>

    <form th:action="@{/login}" method="post" class="auth-form">
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" name="username" required placeholder="you@example.com"/>
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" name="password" required placeholder="Your password"/>
        </div>
        <div class="form-check">
            <input type="checkbox" name="remember-me" id="rememberMe"/>
            <label for="rememberMe">Remember me</label>
        </div>
        <button type="submit" class="btn-primary btn-block">Sign In</button>
    </form>

    <p class="auth-footer">Don't have an account? <a th:href="@{/register}">Sign Up</a></p>
    
</div>
</body>
</html>
