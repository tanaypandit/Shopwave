<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${product.name + ' | ShopWave'}">Product | ShopWave</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
	<style>
	.size-option input[type="radio"] { display: none; }
	.size-option span {
	    display: inline-flex;
	    align-items: center;
	    justify-content: center;
	    width: 48px; height: 48px;
	    border: 1.5px solid #e8e4df;
	    border-radius: 8px;
	    font-size: .9rem;
	    font-weight: 600;
	    cursor: pointer;
	    transition: all .2s;
	    color: #1a1814;
	}
	.size-option span:hover { border-color: #e8521a; color: #e8521a; }
	.size-option input:checked + span {
	    border-color: #e8521a;
	    background: #e8521a;
	    color: #fff;
	}
	.size-btn {
	    display: inline-flex;
	    align-items: center;
	    justify-content: center;
	    width: 50px;
	    height: 50px;
	    border: 1.5px solid #e8e4df;
	    border-radius: 8px;
	    font-size: .9rem;
	    font-weight: 600;
	    color: #1a1814;
	    transition: all .2s;
	    user-select: none;
	}
	.size-btn:hover {
	    border-color: #e8521a;
	    color: #e8521a;
	}
	input[type="radio"]:checked + .size-btn {
	    background: #e8521a;
	    border-color: #e8521a;
	    color: #fff;
	}
	</style>
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div th:replace="~{fragments/layout :: flash}"></div>

<div class="container" style="padding-top: 2rem;">
    <!-- Breadcrumb -->
    <nav class="breadcrumb">
        <a th:href="@{/}">Home</a> /
        <a th:href="@{/shop}">Shop</a> /
        <a th:if="${product.category}" th:href="@{/shop(categoryId=${product.category.id})}"
           th:text="${product.category.name}">Category</a>
        <span th:if="${product.category}"> / </span>
        <span th:text="${product.name}">Product</span>
    </nav>

    <!-- Product Detail -->
    <div class="product-detail">
        <div class="product-detail-img">
            <img th:src="${product.imageUrl}" th:alt="${product.name}"
                 onerror="this.src='https://via.placeholder.com/500x500'"/>
        </div>
        <div class="product-detail-info">
            <span class="product-brand" th:text="${product.brand}">Brand</span>
            <h1 th:text="${product.name}">Product Name</h1>
            <div class="product-rating">
                <span class="stars large" th:data-rating="${product.rating}">★★★★★</span>
                <span th:text="${product.rating} + ' (' + ${product.reviewCount} + ' reviews)'"></span>
            </div>
            <div class="product-price-block">
                <strong class="price large" th:text="'₹' + ${#numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')}">₹0</strong>
                <span class="stock-badge in-stock" th:if="${product.inStock}">
                    <i class="fas fa-check-circle"></i> In Stock (<span th:text="${product.stockQuantity}"></span> left)
                </span>
                <span class="stock-badge out-stock" th:unless="${product.inStock}">
                    <i class="fas fa-times-circle"></i> Out of Stock
                </span>
            </div>
            <p class="product-desc" th:text="${product.description}">Description</p>

			<!-- For CUSTOMER only: show add to cart -->
			<div class="add-to-cart-section" th:if="${product.inStock}"
			     sec:authorize="hasRole('CUSTOMER')">
			    <form th:action="@{/cart/add}" method="post" class="add-cart-form"
			          id="addCartForm">
			        <input type="hidden" name="productId" th:value="${product.id}"/>

					<!-- ✅ Size selector — only for Fashion category -->
					<div th:if="${product.category != null
					             and product.category.name == 'Fashion'}"
					     style="margin-bottom:1rem; width:100%;">
					    <label style="font-size:.85rem; font-weight:600;
					                  display:block; margin-bottom:.6rem;">
					        <i class="fas fa-ruler" style="color:#e8521a;"></i>
					        Select Size
					    </label>

					    <!-- ✅ Hidden default — controller detects if nothing selected -->
					    <input type="radio" name="selectedSize"
					           value="SELECT_SIZE" checked
					           style="display:none;" id="sizeDefault"/>

					    <div style="display:flex; gap:.6rem; flex-wrap:wrap;">
					        <label th:each="size : ${ {'XS','S','M','L','XL','XXL'} }"
					               class="size-option">
					            <input type="radio" name="selectedSize"
					                   th:value="${size}"/>
					            <span th:text="${size}"></span>
					        </label>
					    </div>
					    <p style="font-size:.78rem; color:#6b6560; margin-top:.5rem;">
					        <i class="fas fa-info-circle"></i>
					        Please select a size before adding to cart.
					    </p>
					</div>

			        <!-- Quantity -->
			        <div class="qty-selector">
			            <button type="button" onclick="changeQty(-1)">
			                <i class="fas fa-minus"></i>
			            </button>
			            <input type="number" name="quantity" id="qty"
			                   value="1" min="1"
			                   th:max="${product.stockQuantity}"/>
			            <button type="button" onclick="changeQty(1)">
			                <i class="fas fa-plus"></i>
			            </button>
			        </div>

			        <button type="submit" class="btn-primary btn-lg"
			                onclick="return validateSize(this.form)">
			            <i class="fas fa-shopping-bag"></i> Add to Cart
			        </button>

			    </form>
			</div>

			<!-- For anonymous users only -->
			<div class="add-to-cart-section" th:if="${product.inStock}"
			     sec:authorize="isAnonymous()">
			    <a th:href="@{/login}" class="btn-primary btn-lg">
			        <i class="fas fa-lock"></i> Login to Add
			    </a>
			</div>

			<!-- For anonymous users only: prompt to login -->
			<div class="add-to-cart-section" th:if="${product.inStock}"
			     sec:authorize="isAnonymous()">
			    <a th:href="@{/login}" class="btn-primary btn-lg">
			        <i class="fas fa-lock"></i> Login to Add
			    </a>
			</div>

            <div class="product-meta">
                <span><i class="fas fa-tag"></i> Category: <strong th:text="${product.category?.name}">Category</strong></span>
                <span><i class="fas fa-industry"></i> Brand: <strong th:text="${product.brand}">Brand</strong></span>
                <span><i class="fas fa-truck"></i> Free shipping on orders above ₹500</span>
            </div>
        </div>
    </div>

    <!-- Related Products -->
    <div class="section" th:if="${!relatedProducts.empty}">
        <div class="section-header">
            <h2>Related Products</h2>
        </div>
        <div class="products-grid">
            <div th:each="p : ${relatedProducts}" class="product-card">
                <a th:href="@{/product/{id}(id=${p.id})}" class="product-img-wrap">
                    <img th:src="${p.imageUrl}" th:alt="${p.name}"
                         onerror="this.src='https://via.placeholder.com/300x300'"/>
                </a>
                <div class="product-info">
                    <span class="product-brand" th:text="${p.brand}">Brand</span>
                    <h3><a th:href="@{/product/{id}(id=${p.id})}" th:text="${p.name}">Name</a></h3>
                    <div class="product-footer">
                        <strong class="price" th:text="'₹' + ${#numbers.formatDecimal(p.price, 1, 'COMMA', 0, 'POINT')}">₹0</strong>
                        <a th:href="@{/product/{id}(id=${p.id})}" class="btn-cart"><i class="fas fa-eye"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
<script>
function changeQty(delta) {
    const input = document.getElementById('qty');
    const max = parseInt(input.max) || 999;
    const newVal = Math.max(1, Math.min(max, parseInt(input.value) + delta));
    input.value = newVal;
}

function validateSize(form) {
    // ✅ Check if size selector exists on this page
    const defaultInput = document.getElementById('sizeDefault');
    if (!defaultInput) return true; // not a fashion product — allow

    // ✅ Check if a real size was selected (not the hidden default)
    const selected = form.querySelector(
        'input[name="selectedSize"]:checked');
    if (!selected || selected.value === 'SELECT_SIZE') {
        alert('Please select a size (XS, S, M, L, XL or XXL) before adding to cart.');
        return false;
    }
    return true;
}
</script>
</body>
</html>
